<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Tisi — Video Editor</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Sans:ital,wght@0,300;0,400;1,300&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #080808;
      --surface: #111111;
      --border: #1e1e1e;
      --text: #e8e4dc;
      --muted: #5a5750;
      --accent: #c8ff00;
      --accent2: #ff6b35;
      --white: #ffffff;
    }

    html { scroll-behavior: smooth; }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'DM Sans', sans-serif;
      font-weight: 300;
      line-height: 1.6;
      overflow-x: hidden;
    }

    /* NAV */
    nav {
      position: fixed;
      top: 0; left: 0; right: 0;
      z-index: 100;
      padding: 24px 48px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      background: linear-gradient(to bottom, rgba(8,8,8,0.95) 0%, transparent 100%);
      backdrop-filter: blur(2px);
    }
    .nav-logo {
      font-family: 'Syne', sans-serif;
      font-weight: 800;
      font-size: 1.4rem;
      letter-spacing: -0.02em;
      color: var(--white);
    }
    .nav-logo span { color: var(--accent); }
    .nav-right {
      display: flex;
      align-items: center;
      gap: 32px;
    }
    .nav-links {
      display: flex;
      gap: 36px;
      list-style: none;
    }
    .nav-links a {
      color: var(--muted);
      text-decoration: none;
      font-size: 0.82rem;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      transition: color 0.2s;
    }
    .nav-links a:hover { color: var(--accent); }

    /* LANG SWITCHER */
    .lang-switcher {
      display: flex;
      align-items: center;
      gap: 2px;
      border: 1px solid var(--border);
      padding: 2px;
      background: rgba(255,255,255,0.02);
    }
    .lang-btn {
      background: none;
      border: none;
      cursor: pointer;
      padding: 5px 10px;
      font-family: 'Syne', sans-serif;
      font-size: 0.7rem;
      font-weight: 700;
      letter-spacing: 0.1em;
      color: var(--muted);
      transition: color 0.2s, background 0.2s;
      display: flex;
      align-items: center;
      gap: 5px;
      text-transform: uppercase;
    }
    .lang-btn .flag { font-size: 0.9rem; line-height: 1; }
    .lang-btn:hover { color: var(--text); }
    .lang-btn.active {
      background: var(--accent);
      color: #000;
    }

    /* HAMBURGER */
    .nav-hamburger {
      display: none;
      flex-direction: column;
      gap: 5px;
      background: none;
      border: none;
      padding: 4px;
      cursor: pointer;
      z-index: 102;
    }
    .nav-hamburger span {
      display: block;
      width: 24px; height: 1.5px;
      background: var(--text);
      transition: all 0.3s;
    }
    .nav-hamburger.open span:nth-child(1) { transform: translateY(6.5px) rotate(45deg); }
    .nav-hamburger.open span:nth-child(2) { opacity: 0; }
    .nav-hamburger.open span:nth-child(3) { transform: translateY(-6.5px) rotate(-45deg); }

    /* MOBILE MENU OVERLAY */
    .nav-mobile-menu {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(8,8,8,0.98);
      z-index: 101;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 40px;
    }
    .nav-mobile-menu.open { display: flex; }
    .nav-mobile-menu a {
      color: var(--text);
      text-decoration: none;
      font-family: 'Syne', sans-serif;
      font-size: 2.2rem;
      font-weight: 700;
      letter-spacing: -0.02em;
      transition: color 0.2s;
    }
    .nav-mobile-menu a:hover { color: var(--accent); }
    .nav-mobile-menu .mobile-lang {
      display: flex;
      gap: 8px;
      margin-top: 16px;
    }
    .nav-mobile-menu .mobile-lang .lang-btn {
      font-size: 0.85rem;
      padding: 8px 16px;
      border: 1px solid var(--border);
    }
    .nav-mobile-menu .mobile-lang .lang-btn.active {
      background: var(--accent);
      color: #000;
      border-color: var(--accent);
    }

    /* HERO */
    #hero {
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      justify-content: center;
      padding: 0 48px;
      position: relative;
      overflow: hidden;
    }
    .hero-grid-lines {
      position: absolute;
      inset: 0;
      background-image:
        linear-gradient(rgba(200,255,0,0.025) 1px, transparent 1px),
        linear-gradient(90deg, rgba(200,255,0,0.025) 1px, transparent 1px);
      background-size: 80px 80px;
      pointer-events: none;
    }
    .hero-glow {
      position: absolute;
      width: 600px; height: 600px;
      background: radial-gradient(circle, rgba(200,255,0,0.06) 0%, transparent 70%);
      top: 10%; right: -10%;
      pointer-events: none;
    }
    .hero-inner {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 64px;
      align-items: center;
      width: 100%;
      max-width: 1400px;
    }
    .hero-tag {
      font-size: 0.75rem;
      letter-spacing: 0.18em;
      text-transform: uppercase;
      color: var(--accent);
      margin-bottom: 28px;
      display: flex;
      align-items: center;
      gap: 10px;
    }
    .hero-tag::before {
      content: '';
      display: block;
      width: 32px; height: 1px;
      background: var(--accent);
    }
    .hero-title {
      font-family: 'Syne', sans-serif;
      font-weight: 800;
      font-size: clamp(3rem, 5.5vw, 6.5rem);
      line-height: 0.92;
      letter-spacing: -0.03em;
      color: var(--white);
      margin-bottom: 32px;
    }
    .hero-title .accent-word { color: var(--accent); }
    .hero-title .outline-word {
      -webkit-text-stroke: 1.5px rgba(255,255,255,0.25);
      color: transparent;
    }
    .hero-desc {
      max-width: 480px;
      font-size: 1rem;
      color: var(--muted);
      line-height: 1.7;
      margin-bottom: 40px;
    }
    .hero-desc strong { color: var(--text); font-weight: 400; }
    .hero-cta {
      display: flex;
      gap: 16px;
      align-items: center;
      flex-wrap: wrap;
      margin-bottom: 48px;
    }
    .btn-primary {
      background: var(--accent);
      color: #000;
      padding: 14px 32px;
      font-family: 'Syne', sans-serif;
      font-weight: 700;
      font-size: 0.85rem;
      letter-spacing: 0.05em;
      text-decoration: none;
      display: inline-block;
      transition: transform 0.2s, box-shadow 0.2s;
    }
    .btn-primary:hover {
      transform: translate(-2px, -2px);
      box-shadow: 4px 4px 0 rgba(200,255,0,0.3);
    }
    .btn-ghost {
      color: var(--text);
      padding: 14px 32px;
      font-size: 0.85rem;
      letter-spacing: 0.05em;
      text-decoration: none;
      border: 1px solid var(--border);
      transition: border-color 0.2s, color 0.2s;
    }
    .btn-ghost:hover { border-color: var(--muted); color: var(--white); }
    .hero-stats { display: flex; gap: 40px; }
    .stat-item { text-align: left; }
    .stat-num {
      font-family: 'Syne', sans-serif;
      font-weight: 700;
      font-size: 1.8rem;
      color: var(--white);
      line-height: 1;
    }
    .stat-num span { color: var(--accent); }
    .stat-label {
      font-size: 0.7rem;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: var(--muted);
      margin-top: 4px;
    }
    .hero-right { display: flex; flex-direction: column; gap: 16px; }
    .hero-video-label {
      font-size: 0.7rem;
      letter-spacing: 0.18em;
      text-transform: uppercase;
      color: var(--muted);
      display: flex;
      align-items: center;
      gap: 10px;
    }
    .hero-video-label::before {
      content: '';
      display: block;
      width: 20px; height: 1px;
      background: var(--muted);
    }
    .hero-video-frame {
      position: relative;
      aspect-ratio: 16/9;
      background: var(--surface);
      border: 1px solid var(--border);
      overflow: hidden;
      transition: border-color 0.3s;
    }
    .hero-video-frame:hover { border-color: rgba(200,255,0,0.35); }
    .hero-video-frame::before,
    .hero-video-frame::after {
      content: '';
      position: absolute;
      z-index: 2;
      pointer-events: none;
    }
    .hero-video-frame::before {
      top: -1px; left: -1px;
      width: 28px; height: 28px;
      border-top: 2px solid var(--accent);
      border-left: 2px solid var(--accent);
    }
    .hero-video-frame::after {
      bottom: -1px; right: -1px;
      width: 28px; height: 28px;
      border-bottom: 2px solid var(--accent);
      border-right: 2px solid var(--accent);
    }
    .hero-video-frame iframe { width: 100%; height: 100%; border: none; display: block; }
    .hero-video-meta {
      display: flex;
      align-items: center;
      justify-content: space-between;
    }
    .hero-video-title {
      font-family: 'Syne', sans-serif;
      font-size: 0.82rem;
      font-weight: 600;
      color: var(--text);
    }
    .hero-video-badge {
      padding: 4px 10px;
      background: rgba(200,255,0,0.08);
      border: 1px solid rgba(200,255,0,0.2);
      color: var(--accent);
      font-size: 0.65rem;
      letter-spacing: 0.12em;
      text-transform: uppercase;
    }
    .scroll-indicator {
      position: absolute;
      bottom: 40px; left: 48px;
      display: flex;
      align-items: center;
      gap: 12px;
      color: var(--muted);
      font-size: 0.72rem;
      letter-spacing: 0.12em;
      text-transform: uppercase;
    }
    .scroll-line {
      width: 40px; height: 1px;
      background: var(--muted);
      position: relative;
      overflow: hidden;
    }
    .scroll-line::after {
      content: '';
      position: absolute;
      top: 0; left: -100%;
      width: 100%; height: 100%;
      background: var(--accent);
      animation: scrollLine 2s ease-in-out infinite;
    }
    @keyframes scrollLine {
      0% { left: -100%; }
      50% { left: 0; }
      100% { left: 100%; }
    }

    /* SECTION COMMONS */
    section { padding: 120px 48px; }
    .section-label {
      font-size: 0.72rem;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      color: var(--accent);
      margin-bottom: 16px;
      display: flex;
      align-items: center;
      gap: 12px;
    }
    .section-label::after {
      content: '';
      flex: 1;
      max-width: 40px;
      height: 1px;
      background: var(--accent);
    }
    .section-title {
      font-family: 'Syne', sans-serif;
      font-weight: 700;
      font-size: clamp(2rem, 4vw, 3.2rem);
      color: var(--white);
      letter-spacing: -0.02em;
      line-height: 1.1;
      margin-bottom: 64px;
    }

    /* VIDEOS NORMALES */
    #videos-normales { background: var(--bg); }
    .vnormal-top {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 48px;
      align-items: start;
      margin-bottom: 64px;
    }
    .vnormal-statement {
      font-family: 'Syne', sans-serif;
      font-weight: 800;
      font-size: clamp(1.5rem, 3vw, 2.4rem);
      color: var(--white);
      letter-spacing: -0.025em;
      line-height: 1.15;
      margin-bottom: 28px;
    }
    .vnormal-statement .hl { color: var(--accent); }
    .vnormal-desc {
      font-size: 0.95rem;
      color: var(--muted);
      line-height: 1.8;
      margin-bottom: 36px;
    }
    .vnormal-desc strong { color: var(--text); font-weight: 400; }
    .vnormal-desc em { color: var(--accent); font-style: normal; }
    .vnormal-pillars { display: flex; flex-direction: column; gap: 0; }
    .pillar {
      display: flex;
      align-items: flex-start;
      gap: 18px;
      padding: 16px 0;
      border-bottom: 1px solid var(--border);
    }
    .pillar:first-child { border-top: 1px solid var(--border); }
    .pillar-num {
      font-family: 'Syne', sans-serif;
      font-weight: 700;
      font-size: 0.7rem;
      color: var(--accent);
      letter-spacing: 0.1em;
      padding-top: 2px;
      flex-shrink: 0;
      width: 24px;
    }
    .pillar-title {
      font-family: 'Syne', sans-serif;
      font-weight: 600;
      font-size: 0.88rem;
      color: var(--white);
      margin-bottom: 4px;
    }
    .pillar-text { font-size: 0.8rem; color: var(--muted); line-height: 1.6; }
    .vnormal-top-right { display: flex; flex-direction: column; justify-content: flex-end; }
    .vnormal-top-note {
      padding: 24px;
      border: 1px solid var(--border);
      background: rgba(200,255,0,0.03);
    }
    .vnormal-top-note-title {
      font-family: 'Syne', sans-serif;
      font-size: 0.75rem;
      font-weight: 700;
      color: var(--accent);
      letter-spacing: 0.15em;
      text-transform: uppercase;
      margin-bottom: 10px;
    }
    .vnormal-top-note p { font-size: 0.82rem; color: var(--muted); line-height: 1.7; }
    .vnormal-videos-grid {
      display: grid;
      grid-template-columns: 1fr 1fr 1fr;
      gap: 28px;
    }
    .vnormal-video-col { display: flex; flex-direction: column; gap: 16px; }
    .vnormal-video {
      position: relative;
      aspect-ratio: 16/9;
      background: var(--surface);
      border: 1px solid var(--border);
      overflow: hidden;
      transition: border-color 0.3s;
    }
    .vnormal-video:hover { border-color: rgba(200,255,0,0.3); }
    .vnormal-video iframe { width: 100%; height: 100%; border: none; display: block; }
    .vnormal-video-info { display: flex; flex-direction: column; gap: 12px; }
    .vnormal-video-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
    }
    .vnormal-caption-badge {
      padding: 5px 12px;
      border: 1px solid var(--border);
      font-size: 0.68rem;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: var(--muted);
      white-space: nowrap;
    }
    .vnormal-caption-badge.accent {
      border-color: rgba(200,255,0,0.25);
      color: var(--accent);
      background: rgba(200,255,0,0.05);
    }
    .vnormal-caption-badge.orange {
      border-color: rgba(255,107,53,0.35);
      color: var(--accent2);
      background: rgba(255,107,53,0.06);
    }
    .vnormal-video-label-text {
      font-family: 'Syne', sans-serif;
      font-size: 0.85rem;
      font-weight: 600;
      color: var(--text);
    }
    .stream-tags { display: flex; flex-wrap: wrap; gap: 8px; }
    .tag {
      padding: 6px 14px;
      background: rgba(200,255,0,0.06);
      border: 1px solid rgba(200,255,0,0.15);
      color: var(--accent);
      font-size: 0.72rem;
      letter-spacing: 0.08em;
      text-transform: uppercase;
    }

    /* SHORTS */
    #shorts { background: var(--surface); }
    .shorts-grid {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 16px;
    }
    .short-card {
      position: relative;
      background: var(--surface);
      border: 1px solid var(--border);
      overflow: hidden;
      aspect-ratio: 9/16;
      cursor: pointer;
      transition: border-color 0.3s, transform 0.3s;
    }
    .short-card:hover { border-color: var(--accent); transform: translateY(-4px); }
    .short-card .card-overlay {
      position: absolute;
      inset: 0;
      background: linear-gradient(to top, rgba(0,0,0,0.8) 0%, transparent 50%);
      display: flex;
      flex-direction: column;
      justify-content: flex-end;
      padding: 16px;
      opacity: 0;
      transition: opacity 0.3s;
      pointer-events: none;
    }
    .short-card:hover .card-overlay { opacity: 1; }
    .card-title {
      font-family: 'Syne', sans-serif;
      font-size: 0.8rem;
      font-weight: 600;
      color: var(--white);
    }
    .card-link { position: absolute; inset: 0; z-index: 10; text-decoration: none; }
    .short-thumb {
      width: 100%; height: 100%;
      object-fit: cover;
      display: block;
      transition: transform 0.4s ease;
    }
    .short-card:hover .short-thumb { transform: scale(1.05); }

    /* YouTube Short iframe */
    .short-card iframe {
      width: 100%; height: 100%;
      border: none;
      display: block;
    }

    /* Instagram card */
    .short-card.insta-card {
      display: flex;
      align-items: center;
      justify-content: center;
      background: #0a0a0a;
      cursor: pointer;
    }
    .insta-inner {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 14px;
      pointer-events: none;
    }
    .insta-icon {
      width: 52px; height: 52px;
      background: linear-gradient(135deg, #f09433 0%, #e6683c 25%, #dc2743 50%, #cc2366 75%, #bc1888 100%);
      border-radius: 14px;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: transform 0.3s, box-shadow 0.3s;
    }
    .short-card.insta-card:hover .insta-icon {
      transform: scale(1.1);
      box-shadow: 0 0 24px rgba(220,39,67,0.45);
    }
    .insta-icon svg { width: 28px; height: 28px; fill: white; }
    .insta-label {
      font-family: 'Syne', sans-serif;
      font-size: 0.72rem;
      font-weight: 700;
      color: var(--muted);
      letter-spacing: 0.12em;
      text-transform: uppercase;
    }
    .short-card.insta-card:hover { border-color: #dc2743; transform: translateY(-4px); }
    .short-card.insta-card:hover .insta-label { color: #dc2743; }
    /* Instagram thumb card */
    .short-card.insta-card-thumb { cursor: pointer; position: relative; }
    .short-card.insta-card-thumb:hover { border-color: #dc2743; transform: translateY(-4px); }
    .short-card.insta-card-thumb:hover .short-thumb { transform: scale(1.05); }
    .insta-badge {
      position: absolute;
      top: 10px; left: 10px;
      display: flex;
      align-items: center;
      gap: 5px;
      padding: 4px 10px;
      background: linear-gradient(135deg, #f09433, #dc2743, #bc1888);
      font-family: 'Syne', sans-serif;
      font-size: 0.65rem;
      font-weight: 700;
      color: white;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      z-index: 2;
      border-radius: 2px;
    }

    /* STREAM */
    #streams { background: var(--bg); }
    .stream-feature {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 64px;
      align-items: center;
    }
    .stream-video {
      position: relative;
      aspect-ratio: 16/9;
      background: var(--surface);
      border: 1px solid var(--border);
      overflow: hidden;
    }
    .stream-video iframe { width: 100%; height: 100%; border: none; }
    .stream-badge {
      display: inline-block;
      padding: 4px 12px;
      border: 1px solid var(--border);
      font-size: 0.7rem;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: var(--muted);
      margin-bottom: 24px;
    }
    .stream-title {
      font-family: 'Syne', sans-serif;
      font-weight: 700;
      font-size: 2rem;
      color: var(--white);
      letter-spacing: -0.02em;
      margin-bottom: 16px;
      line-height: 1.2;
    }
    .stream-desc { color: var(--muted); font-size: 0.9rem; line-height: 1.7; margin-bottom: 32px; }

    /* CONTACT */
    #contacto { background: var(--surface); }
    .contact-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 80px;
      align-items: start;
    }
    .about-text {
      font-size: 1.05rem;
      color: var(--muted);
      line-height: 1.8;
      margin-bottom: 40px;
    }
    .about-text strong { color: var(--text); font-weight: 400; }
    .about-text em { color: var(--accent); font-style: normal; }
    .pricing-card {
      background: var(--bg);
      border: 1px solid var(--border);
      padding: 40px;
      position: relative;
      overflow: hidden;
    }
    .pricing-card::before {
      content: '';
      position: absolute;
      top: 0; left: 0;
      width: 100%; height: 3px;
      background: var(--accent);
    }
    .pricing-title {
      font-family: 'Syne', sans-serif;
      font-weight: 700;
      font-size: 1.4rem;
      color: var(--white);
      margin-bottom: 12px;
    }
    .pricing-sub { font-size: 0.85rem; color: var(--muted); line-height: 1.6; margin-bottom: 32px; }
    .pricing-items {
      list-style: none;
      display: flex;
      flex-direction: column;
      gap: 12px;
      margin-bottom: 36px;
    }
    .pricing-items li {
      display: flex;
      align-items: center;
      gap: 12px;
      font-size: 0.85rem;
      color: var(--text);
    }
    .pricing-items li::before {
      content: '';
      width: 6px; height: 6px;
      background: var(--accent);
      flex-shrink: 0;
    }
    .contact-methods { display: flex; flex-direction: column; gap: 12px; }
    .contact-link {
      display: flex;
      align-items: center;
      gap: 16px;
      padding: 16px 20px;
      border: 1px solid var(--border);
      color: var(--text);
      text-decoration: none;
      font-size: 0.85rem;
      transition: border-color 0.2s, background 0.2s;
    }
    .contact-link:hover {
      border-color: var(--accent);
      background: rgba(200,255,0,0.04);
      color: var(--accent);
    }
    .contact-link svg { width: 18px; height: 18px; fill: currentColor; flex-shrink: 0; }
    .contact-link-text { flex: 1; }
    .contact-link-label { font-size: 0.7rem; color: var(--muted); text-transform: uppercase; letter-spacing: 0.1em; }
    .contact-arrow { font-size: 0.8rem; opacity: 0.4; }

    /* FOOTER */
    footer {
      border-top: 1px solid var(--border);
      padding: 32px 48px;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }
    .footer-logo { font-family: 'Syne', sans-serif; font-weight: 800; font-size: 1.1rem; color: var(--white); }
    .footer-logo span { color: var(--accent); }
    .footer-copy { font-size: 0.75rem; color: var(--muted); }

    /* LANG TRANSITION */
    [data-t] { transition: opacity 0.15s ease; }
    body.lang-switching [data-t] { opacity: 0; }

    /* ANIMATIONS */
    .fade-up { opacity: 0; transform: translateY(30px); transition: opacity 0.7s ease, transform 0.7s ease; }
    .fade-up.visible { opacity: 1; transform: translateY(0); }

    /* DIVIDER */
    .divider { width: 100%; height: 1px; background: var(--border); margin: 0; }

    /* RESPONSIVE */
    @media (max-width: 1024px) {
      .hero-title { font-size: clamp(2.8rem, 5vw, 5rem); }
      .shorts-grid { grid-template-columns: repeat(4, 1fr); gap: 12px; }
      .stream-feature { gap: 40px; }
      .vnormal-videos-grid { grid-template-columns: 1fr 1fr; gap: 24px; }
    }

    @media (max-width: 768px) {
      nav { padding: 18px 24px; }
      .nav-links { display: none; }
      .lang-switcher { display: none; }
      .nav-hamburger { display: flex; }

      #hero { padding: 100px 24px 80px; min-height: 100svh; }
      .hero-inner { grid-template-columns: 1fr; gap: 40px; }
      .hero-title { font-size: clamp(2.6rem, 11vw, 4.5rem); }
      .hero-desc { font-size: 0.9rem; max-width: 100%; }
      .hero-glow { width: 280px; height: 280px; right: -15%; }
      .hero-stats { gap: 32px; }
      .scroll-indicator { display: none; }

      section { padding: 64px 24px; }
      .section-title { margin-bottom: 32px; font-size: clamp(1.6rem, 6vw, 2.4rem); }

      .shorts-grid { grid-template-columns: repeat(2, 1fr); gap: 10px; }
      .vnormal-top { grid-template-columns: 1fr; gap: 28px; }
      .vnormal-statement { font-size: clamp(1.3rem, 5vw, 1.9rem); }
      .vnormal-videos-grid { grid-template-columns: 1fr; gap: 40px; }
      .stream-feature { grid-template-columns: 1fr; gap: 28px; }
      .stream-title { font-size: 1.4rem; }

      .contact-grid { grid-template-columns: 1fr; gap: 40px; }
      .about-text { font-size: 0.95rem; margin-bottom: 28px; }
      .pricing-card { padding: 24px 20px; }

    @media (max-width: 480px) {

    // ============================================================
    // I18N ENGINE
    // ============================================================
    let currentLang = 'en';

    function t(key) {
      return translations[currentLang][key] || translations['es'][key] || key;
    }

    function applyTranslations() {
      document.querySelectorAll('[data-t]').forEach(el => {
        el.textContent = t(el.dataset.t);
      });
      document.querySelectorAll('[data-t-html]').forEach(el => {
        el.innerHTML = t(el.dataset.tHtml);
      });
      const list = document.getElementById('pricingList');
      if (list) {
        const items = translations[currentLang]['contact.pricingItems'] || [];
        list.innerHTML = items.map(item => `<li>${item}</li>`).join('');
      }
      document.querySelectorAll('.lang-btn').forEach(btn => {
        btn.classList.toggle('active', btn.dataset.lang === currentLang);
      });
      document.documentElement.lang = currentLang;
    }

    function switchLang(lang) {
      if (lang === currentLang) return;
      currentLang = lang;
      document.body.classList.add('lang-switching');
      setTimeout(() => {
        applyTranslations();
        document.body.classList.remove('lang-switching');
      }, 150);
    }

    document.querySelectorAll('.lang-btn').forEach(btn => {
      btn.addEventListener('click', () => switchLang(btn.dataset.lang));
    });

    applyTranslations();

        // YouTube Short: embed iframe que se reproduce en la card
        const id = extractYTId(url);
        card.className = 'short-card';
        if (id) {
          card.innerHTML = `
            <iframe

    // ============================================================
    // HAMBURGER MENU
    // ============================================================
    const hamburger = document.getElementById('hamburger');
    const mobileMenu = document.getElementById('mobileMenu');
    hamburger.addEventListener('click', () => {
      hamburger.classList.toggle('open');
      mobileMenu.classList.toggle('open');
      document.body.style.overflow = mobileMenu.classList.contains('open') ? 'hidden' : '';
    });
    document.querySelectorAll('.mobile-link').forEach(link => {
      link.addEventListener('click', () => {
        hamburger.classList.remove('open');
        mobileMenu.classList.remove('open');
        document.body.style.overflow = '';
      });
    });

    // ============================================================
    // FADE UP ON SCROLL
    // ============================================================
    const fadeEls = document.querySelectorAll('.fade-up');
    const observer = new IntersectionObserver((entries) => {
      entries.forEach(entry => { if (entry.isIntersecting) entry.target.classList.add('visible'); });
    }, { threshold: 0.1 });
    fadeEls.forEach(el => observer.observe(el));
  </script>
