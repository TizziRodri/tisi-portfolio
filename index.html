<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Tisi — Video Editor</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Sans:ital,wght@0,300;0,400;1,300&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #080808;
      --surface: #111111;
      --border: #1e1e1e;
      --text: #e8e4dc;
      --muted: #5a5750;
      --accent: #c8ff00;
      --accent2: #ff6b35;
      --white: #ffffff;
    }

    html { scroll-behavior: smooth; }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'DM Sans', sans-serif;
      font-weight: 300;
      line-height: 1.6;
      overflow-x: hidden;
    }

    /* NAV */
    nav {
      position: fixed;
      top: 0; left: 0; right: 0;
      z-index: 100;
      padding: 24px 48px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      background: linear-gradient(to bottom, rgba(8,8,8,0.95) 0%, transparent 100%);
      backdrop-filter: blur(2px);
    }
    .nav-logo {
      font-family: 'Syne', sans-serif;
      font-weight: 800;
      font-size: 1.4rem;
      letter-spacing: -0.02em;
      color: var(--white);
    }
    .nav-logo span { color: var(--accent); }
    .nav-right {
      display: flex;
      align-items: center;
      gap: 32px;
    }
    .nav-links {
      display: flex;
      gap: 36px;
      list-style: none;
    }
    .nav-links a {
      color: var(--muted);
      text-decoration: none;
      font-size: 0.82rem;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      transition: color 0.2s;
    }
    .nav-links a:hover { color: var(--accent); }

    /* LANG SWITCHER */
    .lang-switcher {
      display: flex;
      align-items: center;
      gap: 2px;
      border: 1px solid var(--border);
      padding: 2px;
      background: rgba(255,255,255,0.02);
    }
    .lang-btn {
      background: none;
      border: none;
      cursor: pointer;
      padding: 5px 10px;
      font-family: 'Syne', sans-serif;
      font-size: 0.7rem;
      font-weight: 700;
      letter-spacing: 0.1em;
      color: var(--muted);
      transition: color 0.2s, background 0.2s;
      display: flex;
      align-items: center;
      gap: 5px;
      text-transform: uppercase;
    }
    .lang-btn .flag { font-size: 0.9rem; line-height: 1; }
    .lang-btn:hover { color: var(--text); }
    .lang-btn.active {
      background: var(--accent);
      color: #000;
    }

    /* HAMBURGER */
    .nav-hamburger {
      display: none;
      flex-direction: column;
      gap: 5px;
      background: none;
      border: none;
      padding: 4px;
      cursor: pointer;
      z-index: 102;
    }
    .nav-hamburger span {
      display: block;
      width: 24px; height: 1.5px;
      background: var(--text);
      transition: all 0.3s;
    }
    .nav-hamburger.open span:nth-child(1) { transform: translateY(6.5px) rotate(45deg); }
    .nav-hamburger.open span:nth-child(2) { opacity: 0; }
    .nav-hamburger.open span:nth-child(3) { transform: translateY(-6.5px) rotate(-45deg); }

    /* MOBILE MENU OVERLAY */
    .nav-mobile-menu {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(8,8,8,0.98);
      z-index: 101;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 40px;
    }
    .nav-mobile-menu.open { display: flex; }
    .nav-mobile-menu a {
      color: var(--text);
      text-decoration: none;
      font-family: 'Syne', sans-serif;
      font-size: 2.2rem;
      font-weight: 700;
      letter-spacing: -0.02em;
      transition: color 0.2s;
    }
    .nav-mobile-menu a:hover { color: var(--accent); }
    .nav-mobile-menu .mobile-lang {
      display: flex;
      gap: 8px;
      margin-top: 16px;
    }
    .nav-mobile-menu .mobile-lang .lang-btn {
      font-size: 0.85rem;
      padding: 8px 16px;
      border: 1px solid var(--border);
    }
    .nav-mobile-menu .mobile-lang .lang-btn.active {
      background: var(--accent);
      color: #000;
      border-color: var(--accent);
    }

    /* HERO */
    #hero {
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      justify-content: center;
      padding: 0 48px;
      position: relative;
      overflow: hidden;
    }
    .hero-grid-lines {
      position: absolute;
      inset: 0;
      background-image:
        linear-gradient(rgba(200,255,0,0.025) 1px, transparent 1px),
        linear-gradient(90deg, rgba(200,255,0,0.025) 1px, transparent 1px);
      background-size: 80px 80px;
      pointer-events: none;
    }
    .hero-glow {
      position: absolute;
      width: 600px; height: 600px;
      background: radial-gradient(circle, rgba(200,255,0,0.06) 0%, transparent 70%);
      top: 10%; right: -10%;
      pointer-events: none;
    }
    .hero-inner {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 64px;
      align-items: center;
      width: 100%;
      max-width: 1400px;
    }
    .hero-tag {
      font-size: 0.75rem;
      letter-spacing: 0.18em;
      text-transform: uppercase;
      color: var(--accent);
      margin-bottom: 28px;
      display: flex;
      align-items: center;
      gap: 10px;
    }
    .hero-tag::before {
      content: '';
      display: block;
      width: 32px; height: 1px;
      background: var(--accent);
    }
    .hero-title {
      font-family: 'Syne', sans-serif;
      font-weight: 800;
      font-size: clamp(3rem, 5.5vw, 6.5rem);
      line-height: 0.92;
      letter-spacing: -0.03em;
      color: var(--white);
      margin-bottom: 32px;
    }
    .hero-title .accent-word { color: var(--accent); }
    .hero-title .outline-word {
      -webkit-text-stroke: 1.5px rgba(255,255,255,0.25);
      color: transparent;
    }
    .hero-desc {
      max-width: 480px;
      font-size: 1rem;
      color: var(--muted);
      line-height: 1.7;
      margin-bottom: 40px;
    }
    .hero-desc strong { color: var(--text); font-weight: 400; }
    .hero-cta {
      display: flex;
      gap: 16px;
      align-items: center;
      flex-wrap: wrap;
      margin-bottom: 48px;
    }
    .btn-primary {
      background: var(--accent);
      color: #000;
      padding: 14px 32px;
      font-family: 'Syne', sans-serif;
      font-weight: 700;
      font-size: 0.85rem;
      letter-spacing: 0.05em;
      text-decoration: none;
      display: inline-block;
      transition: transform 0.2s, box-shadow 0.2s;
    }
    .btn-primary:hover {
      transform: translate(-2px, -2px);
      box-shadow: 4px 4px 0 rgba(200,255,0,0.3);
    }
    .btn-ghost {
      color: var(--text);
      padding: 14px 32px;
      font-size: 0.85rem;
      letter-spacing: 0.05em;
      text-decoration: none;
      border: 1px solid var(--border);
      transition: border-color 0.2s, color 0.2s;
    }
    .btn-ghost:hover { border-color: var(--muted); color: var(--white); }
    .hero-stats { display: flex; gap: 40px; }
    .stat-item { text-align: left; }
    .stat-num {
      font-family: 'Syne', sans-serif;
      font-weight: 700;
      font-size: 1.8rem;
      color: var(--white);
      line-height: 1;
    }
    .stat-num span { color: var(--accent); }
    .stat-label {
      font-size: 0.7rem;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: var(--muted);
      margin-top: 4px;
    }
    .hero-right { display: flex; flex-direction: column; gap: 16px; }
    .hero-video-label {
      font-size: 0.7rem;
      letter-spacing: 0.18em;
      text-transform: uppercase;
      color: var(--muted);
      display: flex;
      align-items: center;
      gap: 10px;
    }
    .hero-video-label::before {
      content: '';
      display: block;
      width: 20px; height: 1px;
      background: var(--muted);
    }
    .hero-video-frame {
      position: relative;
      aspect-ratio: 16/9;
      background: var(--surface);
      border: 1px solid var(--border);
      overflow: hidden;
      transition: border-color 0.3s;
    }
    .hero-video-frame:hover { border-color: rgba(200,255,0,0.35); }
    .hero-video-frame::before,
    .hero-video-frame::after {
      content: '';
      position: absolute;
      z-index: 2;
      pointer-events: none;
    }
    .hero-video-frame::before {
      top: -1px; left: -1px;
      width: 28px; height: 28px;
      border-top: 2px solid var(--accent);
      border-left: 2px solid var(--accent);
    }
    .hero-video-frame::after {
      bottom: -1px; right: -1px;
      width: 28px; height: 28px;
      border-bottom: 2px solid var(--accent);
      border-right: 2px solid var(--accent);
    }
    .hero-video-frame iframe { width: 100%; height: 100%; border: none; display: block; }
    .hero-video-meta {
      display: flex;
      align-items: center;
      justify-content: space-between;
    }
    .hero-video-title {
      font-family: 'Syne', sans-serif;
      font-size: 0.82rem;
      font-weight: 600;
      color: var(--text);
    }
    .hero-video-badge {
      padding: 4px 10px;
      background: rgba(200,255,0,0.08);
      border: 1px solid rgba(200,255,0,0.2);
      color: var(--accent);
      font-size: 0.65rem;
      letter-spacing: 0.12em;
      text-transform: uppercase;
    }
    .scroll-indicator {
      position: absolute;
      bottom: 40px; left: 48px;
      display: flex;
      align-items: center;
      gap: 12px;
      color: var(--muted);
      font-size: 0.72rem;
      letter-spacing: 0.12em;
      text-transform: uppercase;
    }
    .scroll-line {
      width: 40px; height: 1px;
      background: var(--muted);
      position: relative;
      overflow: hidden;
    }
    .scroll-line::after {
      content: '';
      position: absolute;
      top: 0; left: -100%;
      width: 100%; height: 100%;
      background: var(--accent);
      animation: scrollLine 2s ease-in-out infinite;
    }
    @keyframes scrollLine {
      0% { left: -100%; }
      50% { left: 0; }
      100% { left: 100%; }
    }

    /* SECTION COMMONS */
    section { padding: 120px 48px; }
    .section-label {
      font-size: 0.72rem;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      color: var(--accent);
      margin-bottom: 16px;
      display: flex;
      align-items: center;
      gap: 12px;
    }
    .section-label::after {
      content: '';
      flex: 1;
      max-width: 40px;
      height: 1px;
      background: var(--accent);
    }
    .section-title {
      font-family: 'Syne', sans-serif;
      font-weight: 700;
      font-size: clamp(2rem, 4vw, 3.2rem);
      color: var(--white);
      letter-spacing: -0.02em;
      line-height: 1.1;
      margin-bottom: 64px;
    }

    /* VIDEOS NORMALES */
    #videos-normales { background: var(--bg); }
    .vnormal-top {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 48px;
      align-items: start;
      margin-bottom: 64px;
    }
    .vnormal-statement {
      font-family: 'Syne', sans-serif;
      font-weight: 800;
      font-size: clamp(1.5rem, 3vw, 2.4rem);
      color: var(--white);
      letter-spacing: -0.025em;
      line-height: 1.15;
      margin-bottom: 28px;
    }
    .vnormal-statement .hl { color: var(--accent); }
    .vnormal-desc {
      font-size: 0.95rem;
      color: var(--muted);
      line-height: 1.8;
      margin-bottom: 36px;
    }
    .vnormal-desc strong { color: var(--text); font-weight: 400; }
    .vnormal-desc em { color: var(--accent); font-style: normal; }
    .vnormal-pillars { display: flex; flex-direction: column; gap: 0; }
    .pillar {
      display: flex;
      align-items: flex-start;
      gap: 18px;
      padding: 16px 0;
      border-bottom: 1px solid var(--border);
    }
    .pillar:first-child { border-top: 1px solid var(--border); }
    .pillar-num {
      font-family: 'Syne', sans-serif;
      font-weight: 700;
      font-size: 0.7rem;
      color: var(--accent);
      letter-spacing: 0.1em;
      padding-top: 2px;
      flex-shrink: 0;
      width: 24px;
    }
    .pillar-title {
      font-family: 'Syne', sans-serif;
      font-weight: 600;
      font-size: 0.88rem;
      color: var(--white);
      margin-bottom: 4px;
    }
    .pillar-text { font-size: 0.8rem; color: var(--muted); line-height: 1.6; }
    .vnormal-top-right { display: flex; flex-direction: column; justify-content: flex-end; }
    .vnormal-top-note {
      padding: 24px;
      border: 1px solid var(--border);
      background: rgba(200,255,0,0.03);
    }
    .vnormal-top-note-title {
      font-family: 'Syne', sans-serif;
      font-size: 0.75rem;
      font-weight: 700;
      color: var(--accent);
      letter-spacing: 0.15em;
      text-transform: uppercase;
      margin-bottom: 10px;
    }
    .vnormal-top-note p { font-size: 0.82rem; color: var(--muted); line-height: 1.7; }
    .vnormal-videos-grid {
      display: grid;
      grid-template-columns: 1fr 1fr 1fr;
      gap: 28px;
    }
    .vnormal-video-col { display: flex; flex-direction: column; gap: 16px; }
    .vnormal-video {
      position: relative;
      aspect-ratio: 16/9;
      background: var(--surface);
      border: 1px solid var(--border);
      overflow: hidden;
      transition: border-color 0.3s;
    }
    .vnormal-video:hover { border-color: rgba(200,255,0,0.3); }
    .vnormal-video iframe { width: 100%; height: 100%; border: none; display: block; }
    .vnormal-video-info { display: flex; flex-direction: column; gap: 12px; }
    .vnormal-video-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
    }
    .vnormal-caption-badge {
      padding: 5px 12px;
      border: 1px solid var(--border);
      font-size: 0.68rem;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: var(--muted);
      white-space: nowrap;
    }
    .vnormal-caption-badge.accent {
      border-color: rgba(200,255,0,0.25);
      color: var(--accent);
      background: rgba(200,255,0,0.05);
    }
    .vnormal-caption-badge.orange {
      border-color: rgba(255,107,53,0.35);
      color: var(--accent2);
      background: rgba(255,107,53,0.06);
    }
    .vnormal-video-label-text {
      font-family: 'Syne', sans-serif;
      font-size: 0.85rem;
      font-weight: 600;
      color: var(--text);
    }
    .stream-tags { display: flex; flex-wrap: wrap; gap: 8px; }
    .tag {
      padding: 6px 14px;
      background: rgba(200,255,0,0.06);
      border: 1px solid rgba(200,255,0,0.15);
      color: var(--accent);
      font-size: 0.72rem;
      letter-spacing: 0.08em;
      text-transform: uppercase;
    }

    /* SHORTS */
    #shorts { background: var(--surface); }
    .shorts-grid {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 16px;
    }
    .short-card {
      position: relative;
      background: var(--surface);
      border: 1px solid var(--border);
      overflow: hidden;
      aspect-ratio: 9/16;
      cursor: pointer;
      transition: border-color 0.3s, transform 0.3s;
    }
    .short-card:hover { border-color: var(--accent); transform: translateY(-4px); }
    .short-card .card-overlay {
      position: absolute;
      inset: 0;
      background: linear-gradient(to top, rgba(0,0,0,0.8) 0%, transparent 50%);
      display: flex;
      flex-direction: column;
      justify-content: flex-end;
      padding: 16px;
      opacity: 0;
      transition: opacity 0.3s;
    }
    .short-card:hover .card-overlay { opacity: 1; }
    .card-title {
      font-family: 'Syne', sans-serif;
      font-size: 0.8rem;
      font-weight: 600;
      color: var(--white);
    }
    .card-link { position: absolute; inset: 0; z-index: 10; text-decoration: none; }
    .short-thumb {
      width: 100%; height: 100%;
      object-fit: cover;
      display: block;
      transition: transform 0.4s ease;
    }
    .short-card:hover .short-thumb { transform: scale(1.05); }

    /* STREAM */
    #streams { background: var(--bg); }
    .stream-feature {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 64px;
      align-items: center;
    }
    .stream-video {
      position: relative;
      aspect-ratio: 16/9;
      background: var(--surface);
      border: 1px solid var(--border);
      overflow: hidden;
    }
    .stream-video iframe { width: 100%; height: 100%; border: none; }
    .stream-badge {
      display: inline-block;
      padding: 4px 12px;
      border: 1px solid var(--border);
      font-size: 0.7rem;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: var(--muted);
      margin-bottom: 24px;
    }
    .stream-title {
      font-family: 'Syne', sans-serif;
      font-weight: 700;
      font-size: 2rem;
      color: var(--white);
      letter-spacing: -0.02em;
      margin-bottom: 16px;
      line-height: 1.2;
    }
    .stream-desc { color: var(--muted); font-size: 0.9rem; line-height: 1.7; margin-bottom: 32px; }

    /* CONTACT */
    #contacto { background: var(--surface); }
    .contact-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 80px;
      align-items: start;
    }
    .about-text {
      font-size: 1.05rem;
      color: var(--muted);
      line-height: 1.8;
      margin-bottom: 40px;
    }
    .about-text strong { color: var(--text); font-weight: 400; }
    .about-text em { color: var(--accent); font-style: normal; }
    .pricing-card {
      background: var(--bg);
      border: 1px solid var(--border);
      padding: 40px;
      position: relative;
      overflow: hidden;
    }
    .pricing-card::before {
      content: '';
      position: absolute;
      top: 0; left: 0;
      width: 100%; height: 3px;
      background: var(--accent);
    }
    .pricing-title {
      font-family: 'Syne', sans-serif;
      font-weight: 700;
      font-size: 1.4rem;
      color: var(--white);
      margin-bottom: 12px;
    }
    .pricing-sub { font-size: 0.85rem; color: var(--muted); line-height: 1.6; margin-bottom: 32px; }
    .pricing-items {
      list-style: none;
      display: flex;
      flex-direction: column;
      gap: 12px;
      margin-bottom: 36px;
    }
    .pricing-items li {
      display: flex;
      align-items: center;
      gap: 12px;
      font-size: 0.85rem;
      color: var(--text);
    }
    .pricing-items li::before {
      content: '';
      width: 6px; height: 6px;
      background: var(--accent);
      flex-shrink: 0;
    }
    .contact-methods { display: flex; flex-direction: column; gap: 12px; }
    .contact-link {
      display: flex;
      align-items: center;
      gap: 16px;
      padding: 16px 20px;
      border: 1px solid var(--border);
      color: var(--text);
      text-decoration: none;
      font-size: 0.85rem;
      transition: border-color 0.2s, background 0.2s;
    }
    .contact-link:hover {
      border-color: var(--accent);
      background: rgba(200,255,0,0.04);
      color: var(--accent);
    }
    .contact-link svg { width: 18px; height: 18px; fill: currentColor; flex-shrink: 0; }
    .contact-link-text { flex: 1; }
    .contact-link-label { font-size: 0.7rem; color: var(--muted); text-transform: uppercase; letter-spacing: 0.1em; }
    .contact-arrow { font-size: 0.8rem; opacity: 0.4; }

    /* FOOTER */
    footer {
      border-top: 1px solid var(--border);
      padding: 32px 48px;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }
    .footer-logo { font-family: 'Syne', sans-serif; font-weight: 800; font-size: 1.1rem; color: var(--white); }
    .footer-logo span { color: var(--accent); }
    .footer-copy { font-size: 0.75rem; color: var(--muted); }

    /* LANG TRANSITION */
    [data-t] { transition: opacity 0.15s ease; }
    body.lang-switching [data-t] { opacity: 0; }

    /* ANIMATIONS */
    .fade-up { opacity: 0; transform: translateY(30px); transition: opacity 0.7s ease, transform 0.7s ease; }
    .fade-up.visible { opacity: 1; transform: translateY(0); }

    /* DIVIDER */
    .divider { width: 100%; height: 1px; background: var(--border); margin: 0; }

    /* RESPONSIVE */
    @media (max-width: 1024px) {
      .hero-title { font-size: clamp(2.8rem, 5vw, 5rem); }
      .shorts-grid { grid-template-columns: repeat(4, 1fr); gap: 12px; }
      .stream-feature { gap: 40px; }
      .vnormal-videos-grid { grid-template-columns: 1fr 1fr; gap: 24px; }
    }

    @media (max-width: 768px) {
      nav { padding: 18px 24px; }
      .nav-links { display: none; }
      .lang-switcher { display: none; }
      .nav-hamburger { display: flex; }

      #hero { padding: 100px 24px 80px; min-height: 100svh; }
      .hero-inner { grid-template-columns: 1fr; gap: 40px; }
      .hero-title { font-size: clamp(2.6rem, 11vw, 4.5rem); }
      .hero-desc { font-size: 0.9rem; max-width: 100%; }

        'streams.desc': 'This isn\'t a random clip compilation. It\'s a <strong style="color:var(--text)">complete narrative summary</strong>: I take 9 hours of stream and turn them into 1 hour of video you can watch straight through, with a beginning, middle, and end.<br><br>Every cut makes sense. The pace never drops. And on top of that it\'s loaded with zooms, sound effects, and subtitles that bring life to every moment.',
        'streams.tag1': 'Narrative Summary',
        'streams.tag2': 'Zooms & SFX',

        'contact.label': 'Contact',
        'contact.title': "Let's work together",
        'contact.aboutText': 'I don\'t work with fixed prices. Every project is different, and I prefer the price to <em>adapt to what you need</em>, not the other way around.<br><br>Whether it\'s a single video, a monthly package, or something fully custom — <strong>we talk it through and find something that works for both of us.</strong><br><br>What I do guarantee: <em>fast delivery times</em>, smooth communication, and a result that genuinely serves your channel or brand.',
        'contact.pricingTitle': 'What I offer',
        'contact.pricingSub': 'Price varies by project, quantity, and frequency. Message me and I\'ll put together a custom quote.',
        'contact.pricingItems': [
          'TikToks, Shorts and Reels edited professionally',
          'Regular videos with high retention and precise pacing',
          'Stream summaries and highlights',
          'Editing with effects, transitions and color grading',
          'Delivery in 24–72 hrs depending on the format',
          'Revisions included until it\'s perfect'
        ],

        'footer.copy': '© 2026 Tisi — Video Editor for Social Media',
      }
    };

    // ============================================================
    // I18N ENGINE
    // ============================================================
    let currentLang = 'en';

    function t(key) {
      return translations[currentLang][key] || translations['es'][key] || key;
    }

    function applyTranslations() {
      // text nodes
      document.querySelectorAll('[data-t]').forEach(el => {
        el.textContent = t(el.dataset.t);
      });
      // html nodes (rich text)
      document.querySelectorAll('[data-t-html]').forEach(el => {
        el.innerHTML = t(el.dataset.tHtml);
      });
      // pricing list
      const list = document.getElementById('pricingList');
      if (list) {
        const items = translations[currentLang]['contact.pricingItems'] || [];
        list.innerHTML = items.map(item => `<li>${item}</li>`).join('');
      }
      // lang buttons active state
      document.querySelectorAll('.lang-btn').forEach(btn => {
        btn.classList.toggle('active', btn.dataset.lang === currentLang);
      });
      // html lang attr
      document.documentElement.lang = currentLang;
    }

    function switchLang(lang) {
      if (lang === currentLang) return;
      currentLang = lang;
      document.body.classList.add('lang-switching');
      setTimeout(() => {
        applyTranslations();
        document.body.classList.remove('lang-switching');
      }, 150);
    }

    // attach lang buttons
    document.querySelectorAll('.lang-btn').forEach(btn => {
      btn.addEventListener('click', () => switchLang(btn.dataset.lang));
    });

    // initial render
    applyTranslations();

    // ============================================================
    // SHORTS
    // ============================================================
    const shorts = [
      
      { url: 'https://youtube.com/shorts/hgPn779Nsoo', title: 'Short #1' },
      { url: 'https://youtube.com/shorts/Z8046IRTWJU', title: 'Short #2' },
      { url: 'https://youtube.com/shorts/AaBCVAlUIRM', title: 'Short #3' },
      { url: 'https://youtube.com/shorts/7GjTjtXQt-4', title: 'Short #4' },
      { url: 'https://youtube.com/shorts/YQXJ8YvEOPY', title: 'Short #5' },
      
    ];

    function extractYTId(url) {
      let m = url.match(/\/shorts\/([a-zA-Z0-9_-]{11})/);
      if (m) return m[1];
      m = url.match(/youtu\.be\/([a-zA-Z0-9_-]{11})/);
      if (m) return m[1];
      m = url.match(/[?&]v=([a-zA-Z0-9_-]{11})/);
      if (m) return m[1];
      return null;
    }

    const grid = document.getElementById('shortsGrid');
    shorts.forEach(({ url, title }) => {
      const id = extractYTId(url);
      const thumb = id ? `https://i.ytimg.com/vi/${id}/hqdefault.jpg` : null;
      const card = document.createElement('div');
      card.className = 'short-card';
      card.innerHTML = `
        ${thumb
          ? `<img class="short-thumb" src="${thumb}" alt="${title}" loading="lazy">`
          : `<div style="width:100%;height:100%;background:var(--surface);display:flex;align-items:center;justify-content:center;color:var(--muted);font-size:0.75rem;">Sin preview</div>`
        }
        <div class="card-overlay"><div class="card-title">${title}</div></div>
        <a href="${url}" target="_blank" class="card-link" aria-label="${title}"></a>
      `;
      grid.appendChild(card);
    });

    // ============================================================
    // HAMBURGER MENU
    // ============================================================
    const hamburger = document.getElementById('hamburger');
    const mobileMenu = document.getElementById('mobileMenu');
    hamburger.addEventListener('click', () => {
      hamburger.classList.toggle('open');
      mobileMenu.classList.toggle('open');
      document.body.style.overflow = mobileMenu.classList.contains('open') ? 'hidden' : '';
    });
    document.querySelectorAll('.mobile-link').forEach(link => {
      link.addEventListener('click', () => {
        hamburger.classList.remove('open');
        mobileMenu.classList.remove('open');
        document.body.style.overflow = '';
      });
    });

    // ============================================================
    // FADE UP ON SCROLL
    // ============================================================
    const fadeEls = document.querySelectorAll('.fade-up');
    const observer = new IntersectionObserver((entries) => {
      entries.forEach(entry => { if (entry.isIntersecting) entry.target.classList.add('visible'); });
    }, { threshold: 0.1 });
    fadeEls.forEach(el => observer.observe(el));
  </script>
</body>
</html>
